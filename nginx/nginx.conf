# =============================================================================
# nginx.conf — Reverse proxy routing to Chatwoot and Apache Superset
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Custom log format — includes upstream response time for debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" upstream_addr=$upstream_addr '
                     'upstream_status=$upstream_status '
                     'request_time=$request_time '
                     'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------
    # Upstream definitions
    # These resolve via Docker's embedded DNS — container name = hostname
    # ---------------------------------------------------------------------
    upstream chatwoot_backend {
        server chatwoot-rails:3000;
    }

    upstream superset_backend {
        server superset_app:8088;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------------------------------------------------
        # Route: /chatwoot -> Chatwoot Rails app
        # -------------------------------------------------------------------
        location /chatwoot/ {
            proxy_pass http://chatwoot_backend/;

            # Pass through real client info to the backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support — Chatwoot uses Action Cable for real-time updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # If the backend is down, fail fast with a clear error
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # Redirect bare /chatwoot to /chatwoot/ (trailing slash matters for proxy_pass)
        location = /chatwoot {
            return 301 /chatwoot/;
        }

        # -------------------------------------------------------------------
        # Route: /superset -> Apache Superset
        # -------------------------------------------------------------------
        location /superset/ {
            proxy_pass http://superset_backend/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        location = /superset {
            return 301 /superset/;
        }

        # -------------------------------------------------------------------
        # Health check endpoint for Nginx itself
        # -------------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "nginx is up\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------------------
        # Default landing page — simple index showing available routes
        # -------------------------------------------------------------------
        location / {
            default_type text/html;
            return 200 '<html><body style="font-family:sans-serif;padding:40px;">
                <h2>Reverse Proxy Active</h2>
                <p><a href="/chatwoot/">Chatwoot</a></p>
                <p><a href="/superset/">Superset</a></p>
                </body></html>';
        }

        # -------------------------------------------------------------------
        # Custom error page — shown when a backend is unreachable (502/504)
        # -------------------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type text/html;
            return 502 '<html><body style="font-family:sans-serif;padding:40px;">
                <h2>Service Unavailable</h2>
                <p>The backend application is not responding. It may be down or restarting.</p>
                </body></html>';
        }
    }
}
